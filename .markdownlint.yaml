# default to true for all rules
default: true

# MD033/no-inline-html
MD033: false

# MD013/line-length
MD013: false

# MD024/no-duplicate-heading
MD024:
  # Allow when nested under different parents e.g. CHANGELOG.md
  siblings_only: true

MD046:
  # Fix conventions (use block disable-enable for exceptions, e.g. for content tabs or markdown cards)
  style: fenced
